<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Project Nightjar | Science Fiction Thriller by Philip Wolfe</title>
  <meta name="description" content="Project Nightjar is an upcoming science fiction thriller by Philip Wolfe." />
  <meta name="author" content="Philip Wolfe" />
  <link rel="canonical" href="https://projectnightjar.com/" />

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #020202;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 26%),
        radial-gradient(circle at center, rgba(120,35,18,0.18), transparent 44%),
        linear-gradient(180deg, #020202 0%, #070707 55%, #000 100%);
      z-index: 0;
    }

    .stars {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(#fff 0.7px, transparent 0.7px),
        radial-gradient(#fff 0.45px, transparent 0.45px);
      background-size: 140px 140px, 90px 90px;
      background-position: 0 0, 40px 70px;
      opacity: 0.16;
      animation: drift 100s linear infinite;
      z-index: 1;
    }

    .static {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='160' height='160' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
      opacity: 0.05;
      mix-blend-mode: screen;
      animation: flicker 0.18s infinite;
      z-index: 3;
    }

    .ember {
      position: fixed;
      bottom: -40px;
      border-radius: 50%;
      background: rgba(255, 109, 43, 0.78);
      box-shadow: 0 0 12px rgba(255, 90, 28, 0.85);
      z-index: 2;
      animation-name: rise;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .ember:nth-of-type(1)  { left: 5%;  width: 2px; height: 2px; animation-duration: 9s;  animation-delay: 0s; }
    .ember:nth-of-type(2)  { left: 12%; width: 5px; height: 5px; animation-duration: 15s; animation-delay: 2s; }
    .ember:nth-of-type(3)  { left: 19%; width: 3px; height: 3px; animation-duration: 11s; animation-delay: 5s; }
    .ember:nth-of-type(4)  { left: 26%; width: 6px; height: 6px; animation-duration: 18s; animation-delay: 1s; }
    .ember:nth-of-type(5)  { left: 34%; width: 2px; height: 2px; animation-duration: 8s;  animation-delay: 4s; }
    .ember:nth-of-type(6)  { left: 42%; width: 4px; height: 4px; animation-duration: 13s; animation-delay: 7s; }
    .ember:nth-of-type(7)  { left: 51%; width: 7px; height: 7px; animation-duration: 20s; animation-delay: 3s; }
    .ember:nth-of-type(8)  { left: 59%; width: 3px; height: 3px; animation-duration: 10s; animation-delay: 6s; }
    .ember:nth-of-type(9)  { left: 68%; width: 5px; height: 5px; animation-duration: 16s; animation-delay: 0.5s; }
    .ember:nth-of-type(10) { left: 76%; width: 2px; height: 2px; animation-duration: 9s;  animation-delay: 8s; }
    .ember:nth-of-type(11) { left: 84%; width: 4px; height: 4px; animation-duration: 14s; animation-delay: 2.5s; }
    .ember:nth-of-type(12) { left: 93%; width: 6px; height: 6px; animation-duration: 19s; animation-delay: 5.5s; }

    main {
      position: relative;
      z-index: 4;
      text-align: center;
      width: 100%;
      max-width: 1000px;
      animation: reveal 2s ease forwards;
      transform: translateY(-1vh);
    }

    .eyebrow {
      font-size: clamp(0.7rem, 2vw, 0.9rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 26px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.5rem, 9vw, 6.6rem);
      font-weight: 600;
      line-height: 1;
      letter-spacing: clamp(0.12em, 1.7vw, 0.26em);
      text-transform: uppercase;
      text-shadow:
        0 0 14px rgba(255,255,255,0.18),
        0 0 42px rgba(255,255,255,0.06);
    }

    .line {
      width: min(180px, 45vw);
      height: 1px;
      margin: 32px auto;
      background: linear-gradient(90deg, transparent, #777, transparent);
      opacity: 0.75;
    }

    .coming {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #cfcfcf;
    }

    footer {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      z-index: 4;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #555;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) translateX(0) scale(0.8);
        opacity: 0;
      }
      12% { opacity: 0.8; }
      70% { opacity: 0.45; }
      100% {
        transform: translateY(-110vh) translateX(55px) scale(1.15);
        opacity: 0;
      }
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-180px); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.04; }
      50% { opacity: 0.075; }
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(-1vh); }
    }

    @media (max-width: 600px) {
      body { padding: 18px; }

      .eyebrow {
        letter-spacing: 0.26em;
        margin-bottom: 20px;
      }

      h1 {
        letter-spacing: 0.1em;
      }

      .coming {
        letter-spacing: 0.26em;
      }

      footer {
        font-size: 0.6rem;
        letter-spacing: 0.16em;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>
  <div class="static"></div>

  <span class="ember"></span><span class="ember"></span><span class="ember"></span>
  <span class="ember"></span><span class="ember"></span><span class="ember"></span>
  <span class="ember"></span><span class="ember"></span><span class="ember"></span>
  <span class="ember"></span><span class="ember"></span><span class="ember"></span>

  <main>
    <div class="eyebrow">A Novel by Philip Wolfe</div>
    <h1>Project Nightjar</h1>
    <div class="line"></div>
    <div class="coming">Coming Soon</div>
  </main>

  <footer></footer>
</body>
</html>
