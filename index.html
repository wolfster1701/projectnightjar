<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Project Nightjar | Science Fiction Thriller by Philip Wolfe</title>
  <meta name="description" content="Project Nightjar is an upcoming science fiction thriller by Philip Wolfe. A mysterious new novel is coming soon." />
  <meta name="keywords" content="Project Nightjar, Philip Wolfe, science fiction thriller, sci-fi novel, upcoming book" />
  <meta name="author" content="Philip Wolfe" />

  <meta property="og:title" content="Project Nightjar" />
  <meta property="og:description" content="An upcoming science fiction thriller by Philip Wolfe." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://projectnightjar.com" />

  <link rel="canonical" href="https://projectnightjar.com/" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
      background: #020202;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.09), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(92, 20, 20, 0.15), transparent 45%),
        linear-gradient(180deg, #020202 0%, #060606 60%, #000 100%);
      z-index: 0;
    }

    .stars {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(#ffffff 0.7px, transparent 0.7px),
        radial-gradient(#ffffff 0.5px, transparent 0.5px);
      background-size: 140px 140px, 90px 90px;
      background-position: 0 0, 40px 70px;
      opacity: 0.18;
      animation: drift 90s linear infinite;
      z-index: 1;
    }

    .static {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='160' height='160' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
      opacity: 0.055;
      mix-blend-mode: screen;
      animation: flicker 0.18s infinite;
      z-index: 3;
    }

    .ember {
      position: fixed;
      bottom: -20px;
      width: 3px;
      height: 3px;
      background: rgba(255, 106, 48, 0.75);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255, 93, 37, 0.75);
      animation: rise 11s linear infinite;
      z-index: 2;
    }

    .ember:nth-child(1) { left: 12%; animation-delay: 0s; }
    .ember:nth-child(2) { left: 28%; animation-delay: 3s; }
    .ember:nth-child(3) { left: 44%; animation-delay: 6s; }
    .ember:nth-child(4) { left: 63%; animation-delay: 1.5s; }
    .ember:nth-child(5) { left: 81%; animation-delay: 5s; }

    main {
      position: relative;
      z-index: 4;
      text-align: center;
      max-width: 900px;
      width: 100%;
      animation: reveal 2s ease forwards;
    }

    .eyebrow {
      font-size: clamp(0.7rem, 2vw, 0.9rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(2.4rem, 9vw, 6.8rem);
      line-height: 0.95;
      letter-spacing: clamp(0.12em, 2vw, 0.28em);
      text-transform: uppercase;
      text-shadow:
        0 0 18px rgba(255,255,255,0.18),
        0 0 50px rgba(255,255,255,0.06);
    }

    .line {
      width: min(180px, 45vw);
      height: 1px;
      margin: 32px auto;
      background: linear-gradient(90deg, transparent, #888, transparent);
      opacity: 0.75;
    }

    .coming {
      font-size: clamp(0.9rem, 2.6vw, 1.1rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #d2d2d2;
      margin-bottom: 20px;
    }

    .tagline {
      max-width: 620px;
      margin: 0 auto;
      color: #9c9c9c;
      font-size: clamp(0.95rem, 2.5vw, 1.05rem);
      line-height: 1.7;
    }

    footer {
      position: fixed;
      bottom: 18px;
      left: 0;
      right: 0;
      z-index: 4;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555;
      padding: 0 20px;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-180px); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.045; }
      50% { opacity: 0.075; }
    }

    @keyframes rise {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      15% { opacity: 0.75; }
      100% {
        transform: translateY(-105vh) translateX(40px);
        opacity: 0;
      }
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 20px;
      }

      .eyebrow {
        letter-spacing: 0.28em;
      }

      h1 {
        letter-spacing: 0.12em;
      }

      .coming {
        letter-spacing: 0.28em;
      }

      footer {
        font-size: 0.62rem;
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>
  <div class="static"></div>

  <span class="ember"></span>
  <span class="ember"></span>
  <span class="ember"></span>
  <span class="ember"></span>
  <span class="ember"></span>

  <main>
    <div class="eyebrow">A Novel by Philip Wolfe</div>
    <h1>Project Nightjar</h1>
    <div class="line"></div>
    <div class="coming">Coming Soon</div>
    <p class="tagline">
      An upcoming science fiction thriller. Something has been found. Something is waking up.
    </p>
  </main>

  <footer>
    Transmission pending
  </footer>
</body>
</html>
